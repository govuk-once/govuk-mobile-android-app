apply plugin: "org.sonarqube"

sonar {
    properties {
        property("sonar.projectName", "govuk-mobile-android-app")
        property("sonar.projectKey", "govuk-once_govuk-mobile-android-app")
        property("sonar.organization", "govuk-once")
        property("sonar.host.url", "https://sonarcloud.io")
        property("sonar.sourceEncoding", "UTF-8")
        property("sonar.qualitygate.wait", "true")
        // When ChatBanner has been removed - this next line can be deleted.
        property("sonar.cpd.exclusions", "app/src/main/kotlin/uk/gov/govuk/widgets/ui/PromoBanner.kt")
    }
}
